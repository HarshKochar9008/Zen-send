workflows:
  ios-simulator:
    name: iOS Simulator Build
    instance_type: mac_mini_m2
    max_build_duration: 30

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Create .env file
        script: |
          set -e
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "ERROR: SUPABASE_URL and SUPABASE_ANON_KEY must be set as env vars in Codemagic." >&2
            exit 1
          fi
          {
            echo "SUPABASE_URL=$SUPABASE_URL"
            echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"
          } > .env
          echo ".env created at $(pwd)/.env ($(wc -c < .env) bytes)"

      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build for iOS Simulator
        script: |
          set -e
          echo "SUPABASE_URL length: ${#SUPABASE_URL}"
          echo "SUPABASE_ANON_KEY length: ${#SUPABASE_ANON_KEY}"
          echo "SUPABASE_URL host: $(echo "$SUPABASE_URL" | sed -E 's#https?://([^/]+).*#\1#')"
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "ERROR: SUPABASE_URL / SUPABASE_ANON_KEY missing at build step" >&2
            exit 1
          fi
          flutter build ios --simulator --debug --no-codesign \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"

      - name: Compress .app bundle
        script: |
          cd build/ios/iphonesimulator
          zip -r Runner.app.zip Runner.app

    artifacts:
      - build/ios/iphonesimulator/Runner.app.zip
