name: ZenSend
description: Real-time mobile file sharing app (Android/iOS only).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.3.4

  # File picking & handling
  file_picker: ^11.0.2
  mime: ^2.0.0
  path_provider: ^2.1.3

  # Save to gallery (Android MediaStore + iOS Photos)
  gal: ^2.3.0

  # Permissions
  permission_handler: ^12.0.1

  # Local storage for identity persistence
  shared_preferences: ^2.2.3

  # SHA-256 checksum for file integrity
  crypto: ^3.0.3

  # Network connectivity detection
  connectivity_plus: ^7.1.1

  # Free disk space checks
  disk_space_plus: ^0.2.4
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^21.0.0
  flutter_dotenv: ^5.2.1

  cupertino_icons: ^1.0.6
  tus_client_dart: ^2.5.0
  cross_file: ^0.3.5+2
  battery_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/logo.png
